<!DOCTYPE html>
<html>

<head>
    <title>Book | DJ Igniter</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
</head>

<body>

    <header>
        <div class="logo">
            <img src="favicon.ico" alt="DJ Igniter Logo">
            <h2>DJ Igniter</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="assistant.html">Assistant</a>
            <a href="booking.html">Book</a>
        </nav>
    </header>

    <div class="container">
        <h2>📅 Book Private Appointment</h2>

        <form id="bookingForm">

            <input type="text" id="name" placeholder="Your Name" required>

            <input type="email" id="email" placeholder="Email" required>

            <!-- 🔥 SMART DROPDOWN -->
            <select id="service" required>
                <option value="">Select Service Type</option>
                <option>🎧 Event DJ</option>
                <option>🎵 Mixtape Production</option>
                <option>💻 Website Development</option>
                <option>🧠 Programming</option>
            </select>

            <input type="date" id="date" required>

            <button type="submit">Book Now</button>
        </form>

        <p id="successMsg"></p>
    </div>

    <footer>
        <p>© 2026 DJ Igniter Studios | All Rights Reserved</p>
    </footer>

    <!-- 🔊 CLICK SOUND -->
    <audio id="clickSound" src="click.mp3"></audio>

    <!-- ⚙️ MAIN SCRIPT -->
    <script src="script.js"></script>

    <!-- 🔥 BOOKING SYSTEM -->
    <script>
        document.getElementById("bookingForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let booking = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                service: document.getElementById("service").value,
                date: document.getElementById("date").value
            };

            let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
            bookings.push(booking);

            localStorage.setItem("bookings", JSON.stringify(bookings));

            document.getElementById("successMsg").innerHTML = "✅ Booking Saved Successfully!";

            // RESET FORM
            document.getElementById("bookingForm").reset();
        });
    </script>

</body>

</html>
